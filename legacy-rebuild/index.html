<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WOWItemMaker Legacy Rebuild</title>
  <style>
    body{margin:0;background:#d4d0c8;font:12px Tahoma,Arial,sans-serif;color:#000}
    .win{width:1280px;margin:10px auto;border:2px solid #808080;border-right-color:#fff;border-bottom-color:#fff;background:#d4d0c8}
    .title{padding:6px 10px;background:#0a246a;color:#fff;font-weight:700}
    fieldset{border:1px solid #808080;background:#d4d0c8;padding:8px;margin:8px}
    legend{padding:0 4px}
    button{height:24px;border:1px solid #808080;background:#d4d0c8;box-shadow:1px 1px 0 #fff inset,-1px -1px 0 #808080 inset;padding:0 8px;cursor:pointer}
    input,select,textarea{border:1px solid #7f9db9;background:#fff;padding:3px 4px;font:12px Tahoma,Arial,sans-serif}
    textarea{min-height:28px;height:28px;resize:vertical}
    .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .tabbar,.subtabbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
    .tabbar button.active,.subtabbar button.active{background:#fff;box-shadow:none}
    .panel{border:1px solid #808080;background:#efefef;padding:8px}
    .hidden{display:none}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
    .field{display:flex;flex-direction:column;gap:3px}
    .wide{grid-column:span 2}.full{grid-column:1/-1}
    .spell5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .stack{display:flex;flex-direction:column;gap:8px}
  </style>
</head>
<body>
<div class="win">
  <div class="title">WOWItemMaker Legacy Rebuild</div>

  <fieldset>
    <legend>数据库连接区（Connection）</legend>
    <div class="row">

      <button id="ShowSetConnBtn">数据库配置（DB Config）</button>
    </div>
  </fieldset>

  <fieldset>

      <button data-tab="tab12">基本信息（Basic 1）2</button>

        <div class="field"><label>spellid_1List</label><select id="spellid_1List"></select></div><div class="field"><label>spelltrigger_1List</label><select id="spelltrigger_1List"></select></div><div class="field"><label>spellcooldown_1TextBox</label><input></div><div class="field"><label>spellid_2List</label><select id="spellid_2List"></select></div>

</div>
<script>
const $ = id => document.getElementById(id);
function fillSelect(id, arr){ const el=$(id); if(!el) return; el.innerHTML=''; for(const x of arr){ const o=document.createElement('option'); o.textContent=x; o.value=x; el.appendChild(o);} }
async function loadDicts(){ const r=await fetch('/api/dicts'); const j=await r.json(); const d=j.dicts||{}; fillSelect('ItemClassList', d.class||[]); fillSelect('ItemSubClassList', d.subclass0||[]); fillSelect('DisplayIDList', d.displayid||[]); fillSelect('QualityList', d.quality||[]); fillSelect('BondingList', d.bonding||[]); fillSelect('FlagsList', d.flags||[]); fillSelect('Ammo_TypeList', d.ammo_type||[]); fillSelect('StatsCountList', d.stats_count||[]); fillSelect('InventoryTypeList', d.inventory_type||[]); fillSelect('SheathList', d.sheath||[]); fillSelect('MaterialList', d.material||[]); fillSelect('AreaList', d.area||[]); fillSelect('MapList', d.map||[]); for (const id of ['spellid_1List','spellid_2List','spellid_3List','spellid_4List','spellid_5List']) fillSelect(id, d.spellid||[]); for (const id of ['spelltrigger_1List','spelltrigger_2List','spelltrigger_3List','spelltrigger_4List','spelltrigger_5List']) fillSelect(id, d.spelltrigger||[]); for (const id of ['SocketColor_1List','SocketColor_2List','SocketColor_3List']) fillSelect(id, d.socketColor||[]); fillSelect('SocketBonusList', d.socketBonus||[]); fillSelect('RandomPropertyList', d.randomProperty||[]); fillSelect('RandomSuffixList', d.randomSuffix||[]); }
function showTab(name){ document.querySelectorAll('.tabpage').forEach(x=>x.classList.add('hidden')); document.querySelectorAll('.tabbar button').forEach(x=>x.classList.remove('active')); $('tab-'+name).classList.remove('hidden'); document.querySelector(`[data-tab="${name}"]`).classList.add('active'); }
function showActionTab(name){ document.querySelectorAll('.actionpage').forEach(x=>x.classList.add('hidden')); document.querySelectorAll('.subtabbar button').forEach(x=>x.classList.remove('active')); $('action-'+name).classList.remove('hidden'); document.querySelector(`[data-actiontab="${name}"]`).classList.add('active'); }
document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
document.querySelectorAll('.subtabbar button').forEach(b=>b.onclick=()=>showActionTab(b.dataset.actiontab));
loadDicts();
</script>
</body>
</html>
