name: build-windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'win-v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 pymysql requests beautifulsoup4

      - name: Build exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --name wowitemmake \
            --icon icon.ico \
            --add-data "icon.png;." \
            --add-data "data;data" \
            native_app_v7_final.py

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/wowitemmake.exe release/
          Compress-Archive -Path release/wowitemmake.exe -DestinationPath release/wowitemmake-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wowitemmake-windows
          path: |
            release/wowitemmake.exe
            release/wowitemmake-windows.zip
