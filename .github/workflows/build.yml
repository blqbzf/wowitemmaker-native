name: Build WOWItemMaker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pymysql

    - name: Build executable
      run: |
        pyinstaller --clean --noconfirm \
          --add-data "minimal-app.html:." \
          --add-data "wowitemmaker-data-dicts.json:." \
          --add-data "itemdbc_mpq_builder.py:." \
          --hidden-import pymysql \
          --onefile \
          --name WOWItemMaker-${{ matrix.platform }} \
          server.py

    - name: Create release package (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p release-package
        cp dist/WOWItemMaker-macos release-package/
        echo '#!/bin/bash
        cd "$(dirname "$0")"
        echo "正在启动 WOWItemMaker..."
        echo "访问地址：http://127.0.0.1:8000/minimal-app.html"
        ./WOWItemMaker-macos' > release-package/启动工具.command
        chmod +x release-package/启动工具.command
        cp README.md release-package/ || true
        cd release-package
        zip -r ../WOWItemMaker-macos.zip .

    - name: Create release package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir release-package
        copy dist\WOWItemMaker-windows.exe release-package\
        copy README.md release-package\ 2>nul || true
        cd release-package
        7z a -tzip ..\WOWItemMaker-windows.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: WOWItemMaker-${{ matrix.platform }}
        path: |
          WOWItemMaker-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Download macOS artifact
      uses: actions/download-artifact@v3
      with:
        name: WOWItemMaker-macos
        path: ./artifacts/

    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: WOWItemMaker-windows
        path: ./artifacts/

    - name: Create Release
      run: |
        gh release create v1.0.0 \
          ./artifacts/WOWItemMaker-macos.zip \
          ./artifacts/WOWItemMaker-windows.zip \
          --title "WOWItemMaker v1.0.0" \
          --notes "跨平台 WOWItemMaker 工具

          ## 下载说明
          - macOS 用户下载：WOWItemMaker-macos.zip
          - Windows 用户下载：WOWItemMaker-windows.zip

          ## 使用方法
          1. 解压下载的文件
          2. macOS: 双击 启动工具.command
          3. Windows: 双击 WOWItemMaker-windows.exe
          4. 在浏览器中打开 http://127.0.0.1:8000/minimal-app.html

          ## 功能
          - 读取/编辑/删除物品
          - 复制/套用物品模板
          - 生成 Item.dbc 补丁
          - 打包 MPQ 补丁
          - 推送补丁到服务器
          - 自动识别测试服/正式服环境" || echo "Release already exists"
